# E2E Tests workflow — runs the Playwright suite against a real VS Code instance with the extension loaded from dist/
# and a Cosmos DB emulator brought up in Docker.
#
# Triggered on PRs and pushes that touch code which could change behaviour observable through the webview (src/,
# test/e2e/, scripts/import-seed.mjs, docker-compose.e2e.yml, package.json, playwright config, the workflow itself).
# Other commits skip the run to keep CI cost reasonable.
#
# Flow:
#   1. Install deps + system libs Electron needs (libgtk/libnss/...).
#   2. Build dist/ explicitly so build failures surface separately from test failures (the globalSetup auto-rebuild
#      would still work, but the diagnostic is worse).
#   3. xvfb-run npm run e2e — globalSetup brings up the emulator (on 8082/1235 via docker compose -p cosmosdb-e2e),
#      seeds it, then Playwright drives a real downloaded VS Code through @vscode/test-electron.
#   4. Upload the HTML report + results (traces/videos) for post-mortem.

name: E2E Tests (Webview + Cosmos DB Emulator)

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - rel/*
      - dev/**
    paths:
      - 'src/**'
      - 'test/e2e/**'
      - 'scripts/import-seed.mjs'
      - 'docker-compose.e2e.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'tsconfig.e2e.json'
      - '.github/workflows/e2e.yml'

  pull_request:
    branches:
      - main
      - rel/*
      - dev/**
    paths:
      - 'src/**'
      - 'test/e2e/**'
      - 'scripts/import-seed.mjs'
      - 'docker-compose.e2e.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'tsconfig.e2e.json'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: 🎭 Run e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Same push+pull_request dedupe trick as build.yml: cancelling either run on the same SHA leaves a failed
    # required check on the PR head. Skip the pull_request run only for same-repo PRs whose head branch already
    # triggers a push run.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository ||
      (github.head_ref != 'main' &&
       !startsWith(github.head_ref, 'rel/') &&
       !startsWith(github.head_ref, 'dev/'))

    # Scope concurrency by PR (or by branch on push) so two forks pushing branches with the same name don't cancel
    # each other.
    concurrency:
      group: >-
        e2e-${{ github.workflow }}-${{
        github.event_name == 'pull_request' &&
        format('{0}-{1}', github.event.pull_request.head.repo.full_name, github.event.pull_request.number) ||
        github.ref_name }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: ⬇️ Install dependencies
        run: npm ci

      - name: 🔧 Install Electron system dependencies
        # Provides libgtk-3, libnss3, libasound2, etc — required by the VS Code Electron build that
        # @vscode/test-electron downloads. `chromium` is the cheapest dep set that covers Electron too.
        run: npx playwright install-deps chromium

      - name: 🔨 Build extension
        # globalSetup auto-rebuilds when dist/ is stale, but doing it explicitly here makes build failures show
        # up as a distinct step in the run log instead of buried inside the e2e step.
        run: npm run vite-prod

      - name: 🧪 Run e2e tests
        id: e2e-tests
        # xvfb-run is mandatory on Linux: Electron has no real headless mode and the runner has no display.
        # `-a` picks the next free display number. Retries (CI: 2) come from playwright.config.ts.
        # COSMOSDB_E2E_SKIP_BUILD=1 — dist/ is already fresh from the build step above; the freshness check in
        # globalSetup would walk src/ for no gain.
        env:
          COSMOSDB_E2E_SKIP_BUILD: '1'
        run: xvfb-run -a npm run e2e

      - name: 📤 Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-html-report-${{ github.run_attempt }}
          # Per-run report lives at test/e2e/.reports/<runId>/html/ (runId is random per
          # invocation — see test/e2e/helpers/e2eIsolation.ts). Two non-obvious requirements:
          #   1. `include-hidden-files: true` — `.reports` starts with a dot, and the action's
          #      default glob walker skips hidden directories entirely, so without this every
          #      pattern under `.reports/` resolves to zero matches.
          #   2. Trailing `/**` — @actions/glob matches files, not bare directories, so
          #      `**/html` on its own would not pick up files inside the html/ folder either.
          path: test/e2e/.reports/**/html/**
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

      - name: 📤 Upload Playwright results (traces, videos, screenshots)
        # `!cancelled()` (not just `failure()`) so we also capture traces/videos when a
        # flaky test fails the first attempt and passes on retry — in that case the job
        # conclusion is `success`, but the trace from the failed attempt is still on disk
        # and is the most useful thing to look at. `if-no-files-found: ignore` keeps the
        # log clean on fully green runs where Playwright wrote nothing here.
        # `include-hidden-files: true` is required because the directory is `.results/`.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ github.run_attempt }}
          path: test/e2e/.results/**
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 14

      - name: 📤 Upload emulator logs on failure
        if: failure()
        run: |
          mkdir -p emulator-logs
          docker logs cosmosdb-e2e-cosmosdb-emulator-1 > emulator-logs/cosmosdb-emulator.log 2>&1 || true
        continue-on-error: true

      - name: 📤 Upload emulator logs artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-emulator-logs-${{ github.run_attempt }}
          path: emulator-logs
          if-no-files-found: warn
          retention-days: 14

      - name: 📊 Generate Job Summary & PR comment
        # Each CI workflow now owns its own PR comment (identified by a stable HTML-comment
        # marker). build.yml posts the compile/lint/prettier/l10n/package summary, test.yml posts
        # the unit/integration summary; this step posts the e2e slice — test result + downloadable
        # HTML report. The marker lets re-runs update the existing comment in-place rather than
        # spamming the PR.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          E2E_RESULT: ${{ steps.e2e-tests.outcome }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          result_icon() {
              case "$1" in
                  success)   echo "✅" ;;
                  failure)   echo "❌" ;;
                  cancelled) echo "⚪" ;;
                  skipped)   echo "⏭️" ;;
                  *)         echo "❓" ;;
              esac
          }
          human_size() {
              awk -v b="$1" 'BEGIN {
                  if (b < 1024)            { printf "%d B", b }
                  else if (b < 1048576)    { printf "%.1f KB", b/1024 }
                  else if (b < 1073741824) { printf "%.2f MB", b/1048576 }
                  else                     { printf "%.2f GB", b/1073741824 }
              }'
          }
          # See build.yml for the rationale behind list_run_artifacts /
          # post_or_update_comment — identical logic, duplicated because GitHub Actions
          # has no first-class way to share inline shell across workflows.
          list_run_artifacts() {
              local run_id=$1
              local arts
              arts=$(gh api --paginate "repos/${REPO}/actions/runs/${run_id}/artifacts" \
                  --jq '.artifacts[] | "\(.id)\t\(.name)\t\(.size_in_bytes)\t\(.expired)"' 2>/dev/null || true)
              if [ -z "$arts" ]; then
                  echo "_None_"
                  return
              fi
              while IFS=$'\t' read -r id name size expired; do
                  [ -z "$id" ] && continue
                  local size_h
                  size_h=$(human_size "$size")
                  if [ "$expired" = "true" ]; then
                      printf -- '- ~~%s~~ — %s _(expired)_\n' "$name" "$size_h"
                  else
                      printf -- '- [%s](%s/%s/actions/runs/%s/artifacts/%s) — %s\n' \
                          "$name" "$SERVER_URL" "$REPO" "$run_id" "$id" "$size_h"
                  fi
              done <<< "$arts"
          }
          post_or_update_comment() {
              local pr=$1
              local marker=$2
              local body_file=$3
              # When "false", this run produced no real results (every tracked check was skipped, e.g. a
              # follow-up commit that didn't actually run these checks). In that case we must NOT clobber an
              # existing comment holding a real success/failure — that would lose the previous state.
              local meaningful=${4:-true}
              local existing_id
              existing_id=$(gh api --paginate "repos/${REPO}/issues/${pr}/comments" \
                  --jq ".[] | select(.body | contains(\"${marker}\")) | .id" 2>/dev/null | head -1)
              if [ "$meaningful" != "true" ] && [ -n "$existing_id" ]; then
                  echo "ℹ️ All checks skipped — keeping existing PR #${pr} comment ${existing_id} unchanged"
                  return 0
              fi
              if [ -n "$existing_id" ]; then
                  if gh api --method PATCH "repos/${REPO}/issues/comments/${existing_id}" \
                          --field body=@"${body_file}" >/dev/null 2>&1; then
                      echo "✅ PR #${pr} comment updated (id ${existing_id})"
                      return 0
                  fi
                  echo "::warning::Failed to PATCH comment ${existing_id}, posting a new one"
              fi
              if gh pr comment "${pr}" --repo "${REPO}" --body-file "${body_file}" >/dev/null 2>&1; then
                  echo "✅ PR #${pr} new comment posted"
                  return 0
              fi
              echo "::warning::Unable to post PR comment on #${pr} (likely a fork PR with a read-only GITHUB_TOKEN). Skipping."
              return 0
          }

          e2e_icon=$(result_icon "$E2E_RESULT")
          artifacts=$(list_run_artifacts "${GITHUB_RUN_ID}")

          # Resolve PR number for push events (no PR payload) by branch name.
          if [ -z "${PR_NUMBER:-}" ] && [ -n "${BRANCH_NAME:-}" ]; then
              pr_info=$(gh pr view "${BRANCH_NAME}" --repo "${REPO}" \
                  --json number 2>/dev/null) || true
              if [ -n "$pr_info" ]; then
                  PR_NUMBER=$(echo "$pr_info" | jq -r '.number // empty')
              fi
          fi

          MARKER="<!-- ci-summary:e2e -->"
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
          ${MARKER}
          # 🎭 E2E Tests (Playwright + VS Code)

          ## 🧪 Result
          - **E2E Tests:** ${e2e_icon} ${E2E_RESULT}

          ## 📥 Artifacts ([run](${SERVER_URL}/${REPO}/actions/runs/${GITHUB_RUN_ID}))
          ${artifacts}

          > Tip: the HTML report artifact contains a self-contained Playwright report.
          > Download the zip, extract, and open \`index.html\` — or run
          > \`npx playwright show-report <extracted-dir>\` for the interactive view.
          SUMMARY_EOF

          echo "✅ Job summary written to: ${GITHUB_STEP_SUMMARY}"

          # Don't overwrite a prior real result with an all-skipped run.
          comment_meaningful=false
          case "$E2E_RESULT" in
              success|failure) comment_meaningful=true ;;
          esac

          if [ -n "${PR_NUMBER:-}" ]; then
              post_or_update_comment "${PR_NUMBER}" "${MARKER}" "${GITHUB_STEP_SUMMARY}" "${comment_meaningful}"
          fi
