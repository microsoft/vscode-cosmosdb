# Integration test workflow — runs the full NoSQL query fixture suite against
# a real Cosmos DB Emulator Docker container.
#
# Triggered only when files that could affect query behaviour change, keeping
# CI cost low on unrelated commits.
#
# The emulator data directory (.cosmosdb-data) is cached by a hash of the seed
# files. On a cache hit the emulator starts with data already present and
# seeding is skipped entirely.

name: Integration Tests (Cosmos DB Emulator)

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'scripts/import-seed.mjs'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/import-seed.mjs'
      - '.github/workflows/integration-tests.yml'

jobs:
  integration:
    name: Run integration tests
    runs-on: ubuntu-latest

    env:
      COSMOS_ENDPOINT: https://localhost:8081
      # The well-known emulator master key (vnext-preview default)
      COSMOS_KEY: C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build nosql-language-service
        run: npm run build
        working-directory: packages/nosql-language-service

      # ── Emulator data cache ──────────────────────────────────────────────────
      # Cache key covers all seed JSON files. On a hit the .cosmosdb-data volume
      # is restored before the container starts, so the emulator already contains
      # the seeded documents and the import step is skipped.

      - name: Restore emulator data cache
        id: data-cache
        uses: actions/cache@v4
        with:
          path: .cosmosdb-data
          key: emulator-data-${{ hashFiles('packages/nosql-language-service/src/test-fixtures/containers/**') }}

      # ── Start emulator ───────────────────────────────────────────────────────

      - name: Start Cosmos DB Emulator
        run: docker compose up -d

      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for Cosmos DB Emulator..."
          for i in $(seq 1 30); do
            if curl -fsk https://localhost:8081/_explorer/emulator.pem -o /dev/null 2>&1; then
              echo "Emulator is ready after $i attempts."
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, sleeping 10s..."
            sleep 10
          done
          echo "Emulator did not become ready in time." >&2
          exit 1

      # ── Seed (cache miss only) ───────────────────────────────────────────────

      - name: Seed emulator
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: |
          node scripts/import-seed.mjs --container products
          node scripts/import-seed.mjs --container orders
          node scripts/import-seed.mjs --container events

      # ── Integration tests ────────────────────────────────────────────────────

      - name: Run integration tests
        run: npx vitest run --reporter=verbose
        working-directory: packages/nosql-language-service

      # ── Cleanup ──────────────────────────────────────────────────────────────

      - name: Stop emulator
        if: always()
        run: docker compose down
