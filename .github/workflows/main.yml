name: Node PR Lint, Build and Test

permissions:
    contents: read

on:
    # Trigger when manually run
    workflow_dispatch:

    # Trigger on pushes to `main`, `rel/*`, or `dev/**`
    push:
        branches:
            - main
            - rel/*
            - dev/**

    # Trigger on pull requests to `main`, `rel/*`, or `dev/**`
    pull_request:
        branches:
            - main
            - rel/*
            - dev/**

jobs:
    Build:
        runs-on: ubuntu-latest

        # A push to a branch with an open PR fires both `push` and `pull_request`
        # events. Rather than cancelling one of them (a cancelled run reports
        # as a failed required check on the PR's head SHA and blocks merge),
        # we skip the `pull_request` run entirely for same-repo PRs â€” the
        # `push` event already builds the head SHA and satisfies the required
        # `Build` check. For PRs from forks, `push` does not fire in this repo,
        # so we still let `pull_request` run.
        if: >-
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name != github.repository

        # Concurrency only dedupes runs for the SAME branch across DIFFERENT
        # commits (e.g. rapid pushes during a rebase). The cancelled older run
        # is on a stale SHA that is no longer the PR head, so it does not
        # block the PR. Push and pull_request events for the same SHA are
        # already deduped by the `if` above, so they never collide here.
        concurrency:
            group: build-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
            cancel-in-progress: true

        defaults:
            run:
                working-directory: '.'

        steps:
            # Setup
            - uses: actions/checkout@v6

            - name: đź“¦ Using Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: 'npm'
                  cache-dependency-path: '**/package-lock.json'

            - name: âš–ď¸Ź Validate Version / Preview Alignment
              shell: pwsh
              run: |
                  $packageJson = Get-Content "package.json" -Raw | ConvertFrom-Json
                  $version = $packageJson.version
                  $preview = [bool]$packageJson.preview

                  Write-Output "đź“¦ Package version: $version"
                  Write-Output "đźŹ·ď¸Ź Preview flag: $preview"

                  # Validate semantic versioning format
                  if ($version -notmatch '^(\d+)\.(\d+)\.(\d+)$') {
                      Write-Error "âťŚ Invalid semantic version format: $version"
                      exit 1
                  }

                  $minor = [int]$Matches[2]
                  $minorEven = ($minor % 2) -eq 0

                  # Check version/preview alignment
                  # Convention: odd minor versions = preview, even minor versions = stable
                  if ($preview -and $minorEven) {
                      Write-Warning "âš ď¸Ź Version/preview misalignment: preview=$preview but minor version $minor is even (should be odd for preview)"
                      Write-Warning "Convention: Odd minor versions (e.g., 1.1.x, 1.3.x) should be preview, even (e.g., 1.0.x, 1.2.x) should be stable"
                  } elseif (-not $preview -and -not $minorEven) {
                      Write-Warning "âš ď¸Ź Version/preview misalignment: preview=$preview but minor version $minor is odd (should be even for stable)"
                      Write-Warning "Convention: Odd minor versions (e.g., 1.1.x, 1.3.x) should be preview, even (e.g., 1.0.x, 1.2.x) should be stable"
                  } else {
                      Write-Output "âś… Version/preview alignment is correct"
                  }

            - name: â¬‡ď¸Ź Install Dependencies
              run: npm ci

            - name: đźŚŤ Localize
              run: npm run l10n:check

            - name: ďż˝ Verify External Skills
              shell: bash
              run: |
                  cp -r skills/ skills-backup/
                  npm run fetch-skill
                  # Use --strip-trailing-cr -B -b to ignore line ending, blank line, and whitespace differences
                  if ! diff -rq --strip-trailing-cr -B -b skills/ skills-backup/ > /dev/null 2>&1; then
                      echo "::warning::Committed skills/ does not match the pinned commit in package.json. If you have local skill changes, submit them to the upstream skill repository first, then update the pinned commit in package.json and run 'npm run fetch-skill' to pull the latest version."
                      diff -r --strip-trailing-cr -B -b skills/ skills-backup/ || true
                  else
                      echo "âś… External skills are up to date."
                  fi
                  rm -rf skills/
                  mv skills-backup/ skills/

            - name: ďż˝đź”Ť Lint
              run: npm run lint

            - name: âś¨ Prettier
              run: npm run prettier

            - name: đź”¨ Compile
              run: npm run build

            - name: đź“¦ Package
              run: npm run package

            - name: đź”Ť Verify VSIX File
              id: verify-vsix
              shell: pwsh
              run: |
                  # Find VSIX file
                  $vsixFiles = Get-ChildItem -Path . -Filter *.vsix -File

                  if ($vsixFiles.Count -eq 0) {
                      Write-Error "âťŚ No VSIX file found"
                      exit 1
                  } elseif ($vsixFiles.Count -gt 1) {
                      Write-Error "âťŚ Multiple VSIX files found: $($vsixFiles.Name -join ', ')"
                      exit 1
                  }

                  $vsixFile = $vsixFiles[0]
                  $vsixFileName = $vsixFile.Name
                  $vsixFileSize = [math]::Round($vsixFile.Length / 1MB, 2)

                  Write-Output "âś… Found VSIX: $vsixFileName (${vsixFileSize} MB)"

                  # Verify filename matches expected pattern
                  $packageJson = Get-Content "package.json" -Raw | ConvertFrom-Json
                  $expectedName = "$($packageJson.name)-$($packageJson.version).vsix"

                  if ($vsixFileName -ne $expectedName) {
                      Write-Error "âťŚ VSIX filename mismatch: expected '$expectedName', got '$vsixFileName'"
                      exit 1
                  }

                  Write-Output "âś… VSIX filename is correct: $vsixFileName"

                  # Compute a short commit SHA (7 chars) and a filesystem-safe branch slug.
                  # Use head_ref for pull_request events, otherwise ref_name.
                  $rawRef = if ("${{ github.event_name }}" -eq "pull_request") { "${{ github.head_ref }}" } else { "${{ github.ref_name }}" }
                  $branchSlug = ($rawRef -replace '[^A-Za-z0-9._-]', '-').Trim('-')
                  $shortSha = "${{ github.sha }}".Substring(0, 7)

                  # Artifact name convention:
                  # - main / rel/* : <name>-<version>-<sha7>
                  # - everything else: <branch-slug>-<version>-<sha7>
                  $isRelease = ($rawRef -eq 'main') -or ($rawRef -like 'rel/*')
                  if ($isRelease) {
                      $artifactName = "$($packageJson.name)-$($packageJson.version)-$shortSha"
                  } else {
                      $artifactName = "$branchSlug-$($packageJson.version)-$shortSha"
                  }

                  Write-Output "đź“› Artifact name: $artifactName"

                  # Expose values as step outputs for downstream steps
                  "vsix_file=$vsixFileName" >> $env:GITHUB_OUTPUT
                  "vsix_size=$vsixFileSize" >> $env:GITHUB_OUTPUT
                  "package_version=$($packageJson.version)" >> $env:GITHUB_OUTPUT
                  "package_preview=$($packageJson.preview)" >> $env:GITHUB_OUTPUT
                  "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT

            - name: đź“¤ Upload VSIX
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ steps.verify-vsix.outputs.artifact_name }}
                  path: ${{ steps.verify-vsix.outputs.vsix_file }}
                  if-no-files-found: error
                  compression-level: 0

            - name: đź§Ş Unit Tests
              id: unit-tests
              continue-on-error: true
              run: npm run jesttest

            - name: đź§Ş Integration Tests
              id: integration-tests
              continue-on-error: true
              run: |
                  exit_code=1
                  for i in 1 2 3; do
                      xvfb-run -a npm test
                      exit_code=$?
                      if [ $exit_code -eq 0 ]; then break; fi
                      echo "Attempt $i failed with exit code $exit_code"
                      if [ $i -lt 3 ]; then sleep 15; fi
                  done
                  exit $exit_code

            - name: đź“Š Generate Job Summary
              if: always()
              env:
                  PACKAGE_VERSION: ${{ steps.verify-vsix.outputs.package_version }}
                  PACKAGE_PREVIEW: ${{ steps.verify-vsix.outputs.package_preview }}
                  VSIX_FILE: ${{ steps.verify-vsix.outputs.vsix_file }}
                  VSIX_SIZE: ${{ steps.verify-vsix.outputs.vsix_size }}
                  ARTIFACT_NAME: ${{ steps.verify-vsix.outputs.artifact_name }}
              shell: pwsh
              run: |
                  # Only generate summary if VSIX verification completed
                  if ($env:PACKAGE_VERSION) {
                      # Determine test results
                      $unitTestResult = "${{ steps.unit-tests.outcome }}"
                      $integrationTestResult = "${{ steps.integration-tests.outcome }}"

                      $unitTestIcon = if ($unitTestResult -eq "success") { "âś…" } else { "âťŚ" }
                      $integrationTestIcon = if ($integrationTestResult -eq "success") { "âś…" } else { "âťŚ" }

                      $overallStatus = if ($unitTestResult -eq "success" -and $integrationTestResult -eq "success") {
                          "## âś… Build Status`nAll checks completed successfully!"
                      } else {
                          "## âťŚ Build Status`nSome checks failed. Please review the logs."
                      }

                      # Build commit + PR markdown links
                      $serverUrl = "${{ github.server_url }}"
                      $repo = "${{ github.repository }}"
                      $sha = "${{ github.sha }}"
                      $shortSha = $sha.Substring(0, 7)
                      $commitLink = "[``$shortSha``]($serverUrl/$repo/commit/$sha)"

                      $prNumber = "${{ github.event.pull_request.number }}"
                      $prLine = if ($prNumber) {
                          $prTitle = @'
                  ${{ github.event.pull_request.title }}
                  '@
                          # Escape characters that would break markdown link text
                          $prTitleEscaped = $prTitle -replace '\\', '\\' -replace '\]', '\]'
                          "- **Pull Request:** [#$prNumber $prTitleEscaped]($serverUrl/$repo/pull/$prNumber)"
                      } else {
                          $null
                      }

                      $sourceInfo = @(
                          "## đź”— Source"
                          "- **Commit:** $commitLink"
                      )
                      if ($prLine) { $sourceInfo += $prLine }
                      $sourceSection = $sourceInfo -join "`n"

                      $summary = @"
                  # đźŽ‰ Build Summary

                  $sourceSection

                  ## đź“¦ Package Information
                  - **Version:** $env:PACKAGE_VERSION
                  - **Preview:** $env:PACKAGE_PREVIEW
                  - **VSIX File:** $env:VSIX_FILE
                  - **VSIX Size:** $env:VSIX_SIZE MB
                  - **Artifact Name:** $env:ARTIFACT_NAME.zip

                  ## đź§Ş Test Results
                  - **Unit Tests:** $unitTestIcon $unitTestResult
                  - **Integration Tests:** $integrationTestIcon $integrationTestResult

                  $overallStatus
                  "@

                      $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

                      # Fail the job if any tests failed
                      if ($unitTestResult -ne "success" -or $integrationTestResult -ne "success") {
                          exit 1
                      }
                  } else {
                      Write-Output "âš ď¸Ź Skipping job summary - VSIX verification did not complete"
                  }
