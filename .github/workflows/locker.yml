name: Locker
on:
  schedule:
    - cron: 0 5 * * * # 10:00pm PT
  workflow_dispatch:

# The locker action writes via AZCODE_BOT_PAT, so GITHUB_TOKEN only needs to
# read repo contents for `actions/checkout`. Explicit minimal permissions
# (CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  main:
    name: 🔒 Lock old closed issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions
        uses: actions/checkout@v2
        with:
          repository: "microsoft/vscode-github-triage-actions"
          path: ./actions
          ref: stable
      - name: Install Actions
        run: npm install --production --prefix ./actions
      - name: Run Locker
        uses: ./actions/locker
        with:
          token: ${{secrets.AZCODE_BOT_PAT}}
          daysSinceClose: 45
          daysSinceUpdate: 7
