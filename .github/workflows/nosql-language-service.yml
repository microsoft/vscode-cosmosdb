# Workflow scope: `packages/nosql-language-service` integration tests.
#
# This is NOT the extension-host integration suite under `test/` — that one runs inside `main.yml` ("Build, lint &
# test"). This workflow covers the **NoSQL language service package** (`packages/nosql-language-service`), which talks
# to a real Cosmos DB Emulator over the wire to validate that its query fixtures behave the same against a live
# backend as they do in the unit tests.
#
# Why a separate workflow:
#   - It needs Docker (Cosmos emulator) — `main.yml` does not.
#   - It only matters when `packages/**` or the seed script changes, so the path filter below keeps the run off the
#     vast majority of commits.
#
# Emulator state: the container always starts fresh — no caching, no volumes. The seed dataset is tiny (~100-200
# documents per container) so re-seeding from scratch costs almost nothing.

name: NoSQL Language Service Integration Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'scripts/import-seed.mjs'
      - '.github/workflows/nosql-language-service.yml'
  pull_request:
    paths:
      - 'packages/**'
      - 'scripts/import-seed.mjs'
      - '.github/workflows/nosql-language-service.yml'

jobs:
  integration:
    name: 🧪 NoSQL language-service integration
    runs-on: ubuntu-latest

    env:
      COSMOS_ENDPOINT: https://localhost:8081
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build schema-analyzer
        run: npm run build
        working-directory: packages/schema-analyzer

      - name: Build nosql-language-service
        run: npm run build
        working-directory: packages/nosql-language-service

      # ── Start emulator ───────────────────────────────────────────────────────

      - name: Start Cosmos DB Emulator
        run: docker compose up -d

      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for Cosmos DB Emulator..."
          for i in $(seq 1 60); do
            # vnext-preview exposes its data plane at /; a 200/401/403 response means the listener is up.
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8081/ 2>/dev/null || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
              echo "Emulator is ready after $i attempts (HTTP $STATUS)."
              exit 0
            fi
            echo "Attempt $i/60 — not ready yet (HTTP $STATUS), sleeping 5s..."
            sleep 5
          done
          echo "Emulator did not become ready in time." >&2
          docker compose logs cosmosdb-emulator || true
          exit 1

      # ── Seed ─────────────────────────────────────────────────────────────────

      - name: Seed emulator
        run: |
          node scripts/import-seed.mjs --container products
          node scripts/import-seed.mjs --container orders
          node scripts/import-seed.mjs --container events

      # ── Integration tests ────────────────────────────────────────────────────

      - name: Run NoSQL language-service integration tests
        run: npx vitest run --reporter=verbose src/test-fixtures/integration.test.ts
        working-directory: packages/nosql-language-service

      # ── Cleanup ──────────────────────────────────────────────────────────────

      - name: Stop emulator
        if: always()
        run: docker compose down -v
